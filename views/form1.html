<!DOCTYPE html>
<html>
<head>
  <title>Technician Request Form</title>
  <link rel="stylesheet" href="/styles.css">
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      fetch('/api/contacts')
        .then(r => r.json())
        .then(contacts => {
          const select = document.getElementById('supervisor-select');
          select.innerHTML = '<option value="">-- Select Supervisor --</option>';
          contacts.forEach(c => {
            const fullName = c.first_name + ' ' + c.last_name;
            const opt = document.createElement('option');
            opt.value = fullName;
            opt.textContent = fullName.toUpperCase();
            select.appendChild(opt);
          });
        })
        .catch(() => {
          const select = document.getElementById('supervisor-select');
          select.innerHTML = '<option value="">Error loading supervisors</option>';
        });
    });
  </script>
</head>
<body>
  <h2>Technician Request</h2>
  <form action="/form2" method="POST">
    <label>Name:</label>
    <input type="text" name="name" required><br><br>

    <label>Branch (Pickup Location):</label>
    <select name="branch" required>
      <option value="">-- Select Branch --</option>
      <option value="Amherst & Suburban">Amherst &amp; Suburban</option>
      <option value="Colony, Metro Pest & Select">Colony, Metro Pest &amp; Select</option>
      <option value="Gannon">Gannon</option>
      <option value="Insecta X">Insecta X</option>
      <option value="Lincoln">Lincoln</option>
      <option value="Lincoln & Pestex">Lincoln &amp; Pestex</option>
      <option value="Metro Pest">Metro Pest</option>
      <option value="On The Spot">On The Spot</option>
      <option value="Pestex">Pestex</option>
      <option value="Select">Select</option>
      <option value="Select - LI Commercial & Residential">Select - LI Commercial &amp; Residential</option>
      <option value="Vermin Control">Vermin Control</option>
    </select><br><br>

    <label>Supervisor:</label>
    <select id="supervisor-select" name="supervisor" required>
      <option value="">-- Loading supervisors... --</option>
    </select><br><br>

    <label>Pickup Date:</label>
    <input type="date" name="pickup_date" required><br><br>

    <button type="submit">Next</button>
  </form>
</body>
</html>
