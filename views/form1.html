<!DOCTYPE html>
<html>
<head>
  <title>Technician Request Form</title>
  <link rel="stylesheet" href="/styles.css">
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      let technicians = [];

      fetch('/api/technicians')
        .then(r => r.json())
        .then(data => {
          technicians = data;
          const select = document.getElementById('technician-select');
          select.innerHTML = '<option value="">-- Select Technician --</option>';
          data.forEach((t, i) => {
            const opt = document.createElement('option');
            opt.value = t.first_name + ' ' + t.last_name;
            opt.textContent = t.last_name.toUpperCase() + ', ' + t.first_name.toUpperCase();
            opt.dataset.idx = i;
            select.appendChild(opt);
          });
        })
        .catch(() => {
          document.getElementById('technician-select').innerHTML = '<option value="">Error loading technicians</option>';
        });

      document.getElementById('technician-select').addEventListener('change', function () {
        const opt = this.options[this.selectedIndex];
        if (!this.value) {
          document.getElementById('branch-select').value = '';
          document.getElementById('supervisor-display').value = '';
          return;
        }
        const tech = technicians[opt.dataset.idx];
        document.getElementById('branch-select').value = tech.branch;
        document.getElementById('supervisor-display').value = tech.supervisor;
      });
    });
  </script>
</head>
<body>
  <h2>Technician Request</h2>
  <form action="/form2" method="POST">
    <label>Technician:</label>
    <select id="technician-select" name="name" required>
      <option value="">-- Loading technicians... --</option>
    </select><br><br>

    <label>Branch (Pickup Location):</label>
    <select id="branch-select" name="branch" required>
      <option value="">-- Select Branch --</option>
      <option value="Amherst">Amherst</option>
      <option value="Colony, Metro Pest & Select">Colony, Metro Pest &amp; Select</option>
      <option value="Gannon">Gannon</option>
      <option value="Insecta X">Insecta X</option>
      <option value="Lincoln">Lincoln</option>
      <option value="Lincoln & Pestex">Lincoln &amp; Pestex</option>
      <option value="Metro Pest">Metro Pest</option>
      <option value="On The Spot">On The Spot</option>
      <option value="Pestex">Pestex</option>
      <option value="Select">Select</option>
      <option value="Select - LI Commercial & Residential">Select - LI Commercial &amp; Residential</option>
      <option value="Suburban">Suburban</option>
      <option value="Vermin Control">Vermin Control</option>
    </select><br><br>

    <label>Supervisor:</label>
    <input type="text" id="supervisor-display" name="supervisor" readonly required
      placeholder="Auto-filled when technician is selected"
      style="background:#f0f0f0; cursor:not-allowed;"><br><br>

    <label>Pickup Date:</label>
    <input type="date" name="pickup_date" required><br><br>

    <button type="submit">Next</button>
  </form>
</body>
</html>
